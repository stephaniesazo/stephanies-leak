<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      background: white;
      color: black;
      border: none;
    }
  </style>
</head>
<body>

  <h2>verification required</h2>

  <p>press accept to continue</p>

  <button onclick="getLocation()">ACCEPT</button>

  <p id="output"></p>

  <script>
    function getLocation() {
      if (!navigator.geolocation) {
        document.getElementById("output").innerText = "not supported";
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          document.getElementById("output").innerText =
            "lat: " + pos.coords.latitude +
            "\nlon: " + pos.coords.longitude;
        },
        () => {
          document.getElementById("output").innerText = "permission denied";
        }
      );
    }
  </script>

</body>
</html>
